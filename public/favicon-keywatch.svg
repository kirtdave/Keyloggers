<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0c0700"/>
  <!-- Keyboard base -->
  <rect x="4" y="11" width="24" height="14" rx="2.5" fill="none" stroke="#ff9500" stroke-width="1.5"/>
  <!-- Key rows -->
  <!-- Row 1: 4 keys -->
  <rect x="6.5" y="13.5" width="4" height="3" rx="0.8" fill="#ff9500" opacity="0.9"/>
  <rect x="11.5" y="13.5" width="4" height="3" rx="0.8" fill="#ff9500" opacity="0.6"/>
  <rect x="16.5" y="13.5" width="4" height="3" rx="0.8" fill="#ff9500" opacity="0.6"/>
  <rect x="21.5" y="13.5" width="4" height="3" rx="0.8" fill="#ff6b00" opacity="0.9"/>
  <!-- Row 2: 3 keys + spacebar -->
  <rect x="6.5" y="17.5" width="4" height="3" rx="0.8" fill="#ff9500" opacity="0.5"/>
  <rect x="11.5" y="17.5" width="4" height="3" rx="0.8" fill="#ff9500" opacity="0.5"/>
  <rect x="16.5" y="17.5" width="9" height="3" rx="0.8" fill="#ffd700" opacity="0.8"/>
  <!-- Capture dot — glowing red dot top right corner -->
  <circle cx="27" cy="6" r="3.5" fill="#ff4400"/>
  <circle cx="27" cy="6" r="2" fill="#ff6644"/>
  <!-- Signal arc suggesting transmission -->
  <path d="M5 7 Q5 3 9 3" fill="none" stroke="#ff9500" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M4 9 Q3 3 10 2" fill="none" stroke="#ff9500" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
